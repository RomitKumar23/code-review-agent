# docker-compose.yml — one command to run the entire system
# Usage: docker compose up --build

services:

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./api:/app # hot-reload in dev
      - ./alembic.ini:/app/alembic.ini
      - ./alembic:/app/alembic 
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .          # project root — so Dockerfile can COPY api/ and worker/
      dockerfile: worker/Dockerfile
    env_file: .env
    environment:
      API_PATH: /app/api
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_started

  db:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: codereviewer
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    profiles:
      - ollama   # only starts with: docker compose --profile ollama up

  dashboard:
    build: ./dashboard
    ports:
      - "5173:5173"
    depends_on:
      - api

volumes:
  pgdata:
  ollama_data:
